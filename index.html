<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Skills — Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; border: none; }
input, textarea, select { font-family: inherit; }
a { text-decoration: none; }

/* ── DESIGN TOKENS ── */
:root {
  --bg:       #080B14;
  --bg2:      #0D1117;
  --bg3:      #161B27;
  --bg4:      #1E2535;
  --purple:   #9945FF;
  --purple-dim: rgba(153,69,255,0.15);
  --purple-glow: rgba(153,69,255,0.35);
  --green:    #14F195;
  --green-dim: rgba(20,241,149,0.12);
  --gold:     #D4AF37;
  --red:      #FF4D4D;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #F0F4FF;
  --text-dim: #6B7280;
  --text-muted: #3D4555;
  --radius:   12px;
  --radius-lg: 18px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

/* ── AMBIENT BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 40%, rgba(153,69,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(20,241,149,0.04) 0%, transparent 60%);
}

/* ── LAYOUT ── */
#root { display: flex; min-height: 100vh; position: relative; z-index: 1; }

.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  backdrop-filter: blur(20px);
}

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── SIDEBAR ── */
.s-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.s-logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2px;
  color: var(--text);
}
.s-logo-text span { color: var(--purple); }
.s-logo-sub {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 2px; font-family: 'DM Mono', monospace;
}

.s-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.s-nav-section { padding: 8px 16px 4px; font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

.s-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; margin: 1px 8px;
  border-radius: 8px; cursor: pointer;
  color: var(--text-dim); font-size: 13px; font-weight: 500;
  transition: all var(--transition);
  border: 1px solid transparent;
  user-select: none;
}
.s-nav-item:hover { background: var(--bg3); color: var(--text); }
.s-nav-item.active {
  background: var(--purple-dim); color: var(--text);
  border-color: rgba(153,69,255,0.25);
}
.s-nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

.s-wallet {
  padding: 16px;
  border-top: 1px solid var(--border);
}

/* ── WALLET BUTTON ── */
.wallet-btn {
  width: 100%; padding: 10px 14px;
  background: linear-gradient(135deg, var(--purple), #7B2FBE);
  border-radius: 10px; color: #fff;
  font-weight: 600; font-size: 13px;
  transition: opacity var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.wallet-btn:hover { opacity: 0.85; }
.wallet-btn.connected {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-dim); font-size: 12px;
}
.wallet-addr { color: var(--green); font-family: 'DM Mono', monospace; font-size: 11px; }
.wallet-bal { color: var(--purple); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; margin-top: 6px; }

/* ── NETWORK BADGE ── */
.net-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-dim);
}
.net-dot { width: 6px; height: 6px; border-radius: 50%; background: #F59E0B; animation: pulse 2s infinite; }
.net-dot.mainnet { background: var(--green); }

/* ── TOP BAR ── */
.topbar {
  padding: 24px 32px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; letter-spacing: 2px; color: var(--text);
}
.page-title span { color: var(--purple); }

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 12px; padding: 20px 32px 0;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  transition: border-color var(--transition);
}
.stat-card:hover { border-color: var(--border2); }
.stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 22px; font-weight: 600; color: var(--purple);
  line-height: 1;
}
.stat-val.green { color: var(--green); }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.5px; }

/* ── FILTERS ── */
.filters-row {
  padding: 16px 32px 0;
  display: flex; gap: 12px; align-items: center;
}
.search-wrap {
  flex: 1; position: relative;
}
.search-wrap input {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 14px 10px 38px;
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color var(--transition);
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus { border-color: rgba(153,69,255,0.5); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }

.filter-select {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  color: var(--text); font-size: 13px; outline: none; cursor: pointer;
}
.filter-select option { background: var(--bg2); }

/* ── CATEGORY PILLS ── */
.pills-row {
  padding: 12px 32px 0;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none;
}
.pills-row::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
}
.pill:hover { border-color: var(--border2); color: var(--text); }
.pill.active {
  background: var(--purple-dim); border-color: rgba(153,69,255,0.4);
  color: var(--purple);
}

/* ── GRID ── */
.grid-wrap { padding: 20px 32px 40px; }
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap: 16px;
}

/* ── SKILL CARD ── */
.skill-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all var(--transition);
  display: flex; flex-direction: column; gap: 12px;
}
.skill-card::before {
  content: ''; position: absolute; inset: 0;
  border-radius: var(--radius-lg);
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(153,69,255,0.08), transparent 60%);
  opacity: 0; transition: opacity var(--transition);
}
.skill-card:hover { border-color: rgba(153,69,255,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(153,69,255,0.12); }
.skill-card:hover::before { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; }
.card-emoji { font-size: 28px; line-height: 1; }
.card-cat-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--purple);
  background: var(--purple-dim); border: 1px solid rgba(153,69,255,0.2);
  border-radius: 6px; padding: 3px 8px;
}
.card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.35; }
.card-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; color: var(--text-dim);
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.card-price {
  font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 600;
  color: var(--green);
}
.card-seller { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

.badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; padding: 3px 8px; border-radius: 5px;
  font-weight: 600; letter-spacing: 0.5px;
}
.badge-bought { background: var(--green-dim); color: var(--green); border: 1px solid rgba(20,241,149,0.2); }
.badge-mine { background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.2); }

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1/-1; text-align: center; padding: 80px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-text { font-size: 15px; }

/* ── OVERLAY + MODAL ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,8,16,0.85); backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); width: 520px; max-width: 96vw;
  max-height: 92vh; overflow-y: auto;
  padding: 28px; position: relative;
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(153,69,255,0.1);
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 14px;
  transition: all var(--transition); cursor: pointer;
}
.modal-close:hover { border-color: var(--border2); color: var(--text); }

.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1.5px; margin-bottom: 20px; }

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 7px;
}
.form-input, .form-textarea, .form-select {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px; color: var(--text); font-size: 13px;
  outline: none; transition: border-color var(--transition);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: rgba(153,69,255,0.5); box-shadow: 0 0 0 3px rgba(153,69,255,0.08); }
.form-textarea { height: 90px; resize: vertical; }
.form-select option { background: var(--bg2); }

.price-input-wrap { position: relative; }
.price-input-wrap .form-input { padding-right: 50px; }
.price-suffix {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green); font-weight: 600;
}

/* ── BUTTONS ── */
.btn { padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; transition: all var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
.btn-primary { background: linear-gradient(135deg, var(--purple) 0%, #14B8A6 100%); color: #fff; }
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(153,69,255,0.3); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); }
.btn-secondary:hover { border-color: var(--border2); color: var(--text); }
.btn-buy { width: 100%; padding: 14px; font-size: 14px; background: linear-gradient(135deg, var(--purple), var(--green)); color: #0a0a0a; }
.btn-buy:hover { opacity: 0.9; box-shadow: 0 8px 28px rgba(20,241,149,0.2); }

.modal-footer { display: flex; gap: 10px; margin-top: 22px; }
.modal-footer .btn-primary { flex: 1; }

/* ── DETAIL MODAL ── */
.detail-hero {
  text-align: center; padding: 20px 0 16px;
  border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.detail-emoji { font-size: 52px; margin-bottom: 10px; }
.detail-cat { font-size: 11px; color: var(--purple); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 8px; }
.detail-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.detail-price { font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 700; color: var(--green); margin-top: 12px; }

.detail-section { margin-bottom: 16px; }
.detail-section-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; font-weight: 600; }
.detail-desc { font-size: 13px; color: var(--text-dim); line-height: 1.65; }

.seller-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.seller-addr { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); word-break: break-all; }
.copy-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 11px; color: var(--text-dim); cursor: pointer; flex-shrink: 0; margin-left: 10px; transition: all var(--transition); }
.copy-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── TOAST ── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  min-width: 280px; max-width: 380px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: slideInRight 0.3s cubic-bezier(0.4,0,0.2,1);
  font-size: 13px;
}
.toast.success { border-color: rgba(20,241,149,0.3); }
.toast.error { border-color: rgba(255,77,77,0.3); }
.toast-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.toast-msg { color: var(--text-dim); line-height: 1.4; }
.toast.success .toast-msg { color: var(--text); }

/* ── SPINNER ── */
.spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  animation: spin 0.6s linear infinite; flex-shrink: 0;
}

/* ── LIST SKILL FAB ── */
.fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 100;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #0a0a0a;
  box-shadow: 0 6px 24px rgba(153,69,255,0.35);
  transition: all var(--transition);
}
.fab:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 10px 32px rgba(153,69,255,0.5); }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes cardFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ── STORE HEADER ── */
.store-header {
  background: linear-gradient(135deg, rgba(153,69,255,0.08) 0%, rgba(20,241,149,0.04) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex; align-items: center; gap: 16px;
}
.store-avatar {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, var(--purple), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.store-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
.store-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: 'DM Mono', monospace; }
</style>
</head>

  { title:'Bot de Trading Jupiter DEX',   cat:'trading',  description:'Bot automatique sur Jupiter. Stratégie DCA + grid trading. Code livré + setup guidé.',                           price:3.0, tags:['jupiter','dex','bot'],  seller:'FwENLkAFMhMwkBQJTy7bQhRRXxLknH7FZbSFJV6UMgQk' },
  { title:'Collection NFT 10k Generative',cat:'nft',      description:'Génération de 10 000 NFTs uniques avec traits pondérés. Assets + métadonnées Metaplex.',                         price:5.0, tags:['metaplex','generative','traits'], seller:'3FZbgi29cpjq2GjdwV8eyHuJJnkLtktZc5oDezEBTn87' },
  { title:'Stratégie Marketing Web3',     cat:'marketing',description:'Plan marketing complet: Twitter Growth, Discord setup, KOL outreach. Testé sur 5 projets Solana.',               price:0.8, tags:['twitter','discord','kol'], seller:'BrEqc6zHVR99qZmGkBpLXWDrTFHXvfY8JDpfXBMVNW5G' },
  { title:'Pool Raydium + Stratégie LP',  cat:'defi',     description:'Setup complet pool Raydium CLMM. Stratégie de range optimisée + gestion des fees et rebalancing.',              price:1.5, tags:['raydium','clmm','lp'],  seller:'ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1b55' },

async function seedData() {
  const { count } = await supa.from('skills').select('*', { count:'exact', head:true });
  if (count === 0) await supa.from('skills').insert(SEED);
}

/* ══════════════════════════════════════════
   SKILL CARD
══════════════════════════════════════════ */
function SkillCard({ skill, isBought, isMine, onClick }) {
  const cat   = CATS.find(c => c.id === skill.cat) || CATS[0];
  const short = a => a ? a.slice(0,4)+'...'+a.slice(-4) : '?';
  const cardRef = useRef(null);

  const handleMouseMove = (e) => {
    const rect = cardRef.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
    cardRef.current.style.setProperty('--mx', x+'%');
    cardRef.current.style.setProperty('--my', y+'%');
  };

  return (
    <div
      ref={cardRef}
      className="skill-card"
      onClick={onClick}
      onMouseMove={handleMouseMove}
      style={{animation:`cardFadeIn 0.3s ease both`}}
    >
      {isBought && <span className="badge badge-bought">✅ Acheté</span>}
      {isMine   && <span className="badge badge-mine">⭐ Le tien</span>}

      <div className="card-top">
        <span className="card-emoji">{cat.emoji}</span>
        <span className="card-cat-badge">{cat.label}</span>
      </div>

      <div className="card-title">{skill.title}</div>
      <div className="card-desc">{skill.desc}</div>

      {skill.tags?.length > 0 && (
        <div className="card-tags">
          {skill.tags.slice(0,3).map(t => <span key={t} className="tag">#{t}</span>)}
        </div>
      )}

      <div className="card-footer">
        <span className="card-price">{skill.price} SOL</span>
        <span className="card-seller">{short(skill.seller)}</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SKILL GRID
══════════════════════════════════════════ */
function SkillGrid({ skills, bought, wallet, tab, search, cat, sort, onSelect }) {
  const boughtIds = bought.map(b => b.id);
  const addr = wallet?.publicKey?.toString();

  let list = skills.filter(s => {
    if (tab === 'mine'   && s.seller !== addr)    return false;
    if (tab === 'bought' && !boughtIds.includes(s.id)) return false;
    if (cat !== 'all'  && s.cat !== cat)           return false;
    if (search) {
      const q = search.toLowerCase();
      if (!s.title.toLowerCase().includes(q) && !s.desc.toLowerCase().includes(q) && !(s.tags||[]).join(' ').includes(q)) return false;
    }
    return true;
  });

  if (sort === 'price_asc')  list = [...list].sort((a,b) => a.price - b.price);
  else if (sort === 'price_desc') list = [...list].sort((a,b) => b.price - a.price);
  else list = [...list].sort((a,b) => b.id - a.id);

  if (!list.length) return (
    <div className="skills-grid">
      <div className="empty">
        <div className="empty-icon">👀</div>
        <div className="empty-text">Aucun skill trouvé</div>
      </div>
    </div>
  );

  return (
    <div className="skills-grid">
      {list.map(s => (
        <SkillCard
          key={s.id}
          skill={s}
          isBought={boughtIds.includes(s.id)}
          isMine={s.seller === addr}
          onClick={() => onSelect(s)}
        />
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   LIST MODAL
══════════════════════════════════════════ */
function ListModal({ onClose, onSubmit }) {
  const [form, setForm] = useState({ title:'', cat:'smart', desc:'', price:'', tags:'' });
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setForm(f => ({...f,[k]:v}));

  const submit = async () => {
    if (!form.title || !form.desc || !form.price || parseFloat(form.price)<=0) return;
    setLoading(true);
    await new Promise(r => setTimeout(r, 400));
    onSubmit({
      title: form.title.trim(),
      cat:   form.cat,
      desc:  form.desc.trim(),
      price: parseFloat(form.price),
      tags:  form.tags.split(',').map(t=>t.trim()).filter(Boolean),
    });
    setLoading(false);
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-title">Lister un Skill</div>

        <div className="form-group">
          <label className="form-label">Titre du skill</label>
          <input className="form-input" placeholder="Ex: Audit Smart Contract Solana" value={form.title} onChange={e=>set('title',e.target.value)}/>
        </div>

        <div className="form-group">
          <label className="form-label">Catégorie</label>
          <select className="form-select" value={form.cat} onChange={e=>set('cat',e.target.value)}>
            {CATS.filter(c=>c.id!=='all').map(c=>(
              <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>
            ))}
          </select>
        </div>

        <div className="form-group">
          <label className="form-label">Description</label>
          <textarea className="form-textarea" placeholder="Décris ton skill en détail, ce qui est livré, délais..." value={form.desc} onChange={e=>set('desc',e.target.value)}/>
        </div>

        <div className="form-group">
          <label className="form-label">Prix</label>
          <div className="price-input-wrap">
            <input className="form-input" type="number" step="0.01" min="0.001" placeholder="0.50" value={form.price} onChange={e=>set('price',e.target.value)}/>
            <span className="price-suffix">SOL</span>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Tags (séparés par virgule)</label>
          <input className="form-input" placeholder="anchor, rust, defi" value={form.tags} onChange={e=>set('tags',e.target.value)}/>
        </div>

        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading ? <span className="spinner"/> : '🚀'} Publier le skill
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   DETAIL MODAL
══════════════════════════════════════════ */
function DetailModal({ skill, wallet, boughtIds, onClose, onBuy }) {
  const [loading, setLoading]   = useState(false);
  const [copied,  setCopied]    = useState(false);
  const cat    = CATS.find(c => c.id === skill.cat) || CATS[0];
  const isMine = skill.seller === wallet?.publicKey?.toString();
  const isBought = boughtIds.includes(skill.id);

  const copy = () => {
    navigator.clipboard.writeText(skill.seller).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };

  const handleBuy = async () => {
    if (!wallet) return;
    setLoading(true);
    try {
      const conn    = new solanaWeb3.Connection(NETWORK, 'confirmed');
      const lamports = Math.round(skill.price * solanaWeb3.LAMPORTS_PER_SOL);
      const tx      = new solanaWeb3.Transaction().add(
        solanaWeb3.SystemProgram.transfer({
          fromPubkey: wallet.publicKey,
          toPubkey:   new solanaWeb3.PublicKey(skill.seller),
          lamports,
        })
      );
      const { blockhash } = await conn.getLatestBlockhash();
      tx.recentBlockhash = blockhash;
      tx.feePayer = wallet.publicKey;
      const signed = await wallet.signTransaction(tx);
      const txId   = await conn.sendRawTransaction(signed.serialize());
      await conn.confirmTransaction(txId);
      onBuy(skill, txId);
    } catch(e) {
      onBuy(null, null, e.message);
    }
    setLoading(false);
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>✕</button>

        <div className="detail-hero">
          <div className="detail-emoji">{cat.emoji}</div>
          <div className="detail-cat">{cat.label}</div>
          <div className="detail-title">{skill.title}</div>
          <div className="detail-price">{skill.price} SOL</div>
        </div>

        <div className="detail-section">
          <div className="detail-section-label">Description</div>
          <div className="detail-desc">{skill.desc}</div>
        </div>

        {skill.tags?.length > 0 && (
          <div className="detail-section">
            <div className="detail-section-label">Tags</div>
            <div className="card-tags">
              {skill.tags.map(t => <span key={t} className="tag">#{t}</span>)}
            </div>
          </div>
        )}

        <div className="detail-section">
          <div className="detail-section-label">Vendeur</div>
          <div className="seller-box">
            <span className="seller-addr">{skill.seller}</span>
            <button className="copy-btn" onClick={copy}>{copied ? '✅' : '📋'}</button>
          </div>
        </div>

        <div style={{marginTop:20}}>
          {isMine ? (
            <button className="btn btn-secondary" style={{width:'100%'}} disabled>Ton propre skill</button>
          ) : isBought ? (
            <button className="btn btn-secondary" style={{width:'100%'}} disabled>✅ Déjà acheté</button>
          ) : !wallet ? (
            <button className="btn btn-secondary" style={{width:'100%'}} disabled>Connecte ton wallet</button>
          ) : (
            <button className="btn btn-buy" onClick={handleBuy} disabled={loading}>
              {loading ? <><span className="spinner"/> Transaction en cours...</> : `⚡ Acheter — ${skill.price} SOL`}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
function App() {
  const [tab,      setTab]     = useState('all');
  const [cat,      setCat]     = useState('all');
  const [search,   setSearch]  = useState('');
  const [sort,     setSort]    = useState('date');
  const [skills,   setSkills]  = useState([]);
  const [bought,   setBought]  = useState([]);
  const [loading,  setLoading] = useState(true);
  const [wallet,   setWallet]  = useState(null);
  const [balance,  setBalance] = useState(null);
  const [toasts,   setToasts]  = useState([]);
  const [listOpen, setListOpen] = useState(false);
  const [selected, setSelected] = useState(null);

  const addToast = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);

  /* ── LOAD DATA ── */
  const loadData = useCallback(async () => {
    setLoading(true);
    const [{ data: s }, { data: b }] = await Promise.all([
      supa.from('skills').select('*').order('created_at', { ascending: false }),
      supa.from('purchases').select('*'),
    ]);
    setSkills((s || []).map(norm));
    setBought(b || []);
    setLoading(false);
  }, []);

  useEffect(() => { seedData().then(loadData); }, []);

  /* ── WALLET ── */
  const refreshBalance = useCallback(async (w) => {
    if (!w) return;
    try {
      const conn = new solanaWeb3.Connection(NETWORK, 'confirmed');
      const bal  = await conn.getBalance(w.publicKey);
      setBalance(bal / solanaWeb3.LAMPORTS_PER_SOL);
    } catch {}
  }, []);

  const connectWallet = async () => {
    try {
      if (!window.solana) { addToast('Phantom non détecté!', 'error'); return; }
      await window.solana.connect();
      setWallet(window.solana);
      await refreshBalance(window.solana);
      addToast('Wallet connecté! 🎉', 'success');
    } catch { addToast('Connexion refusée', 'error'); }
  };

  /* ── LIST SKILL ── */
  const handleList = async (data) => {
    if (!wallet) { addToast('Connecte ton wallet!', 'error'); return; }
    const { data: row, error } = await supa.from('skills').insert({
      title: data.title, cat: data.cat,
      description: data.desc,
      price: data.price, tags: data.tags,
      seller: wallet.publicKey.toString(),
    }).select().single();
    if (error) { addToast('Erreur: ' + error.message, 'error'); return; }
    setSkills(s => [norm(row), ...s]);
    setListOpen(false);
    addToast('Skill publié! ✅', 'success');
  };

  /* ── BUY SKILL ── */
  const handleBuy = async (skill, txId, err) => {
    if (err) { addToast('Erreur: ' + err, 'error'); return; }
    const { error } = await supa.from('purchases').insert({
      skill_id: skill.id,
      buyer: wallet.publicKey.toString(),
      tx_id: txId,
      price: skill.price,
    });
    if (error) { addToast('Erreur DB: ' + error.message, 'error'); return; }
    setBought(b => [...b, { skill_id: skill.id, tx_id: txId, price: skill.price }]);
    setSelected(null);
    refreshBalance(wallet);
    addToast(`Achat réussi! TX: ${txId.slice(0,12)}...`, 'success');
  };

  const boughtIds  = bought.map(b => b.skill_id);
  const addr       = wallet?.publicKey?.toString();
  const storeTitle = tab==='mine'
    ? (addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : 'Mon Store')
    : tab==='bought' ? 'Mes Achats' : 'Skills Marketplace';

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar tab={tab} onTab={t=>{setTab(t);setCat('all');setSearch('');}} wallet={wallet} balance={balance} onConnect={connectWallet}/>

      <div className="main">
        <div className="store-header">
          <div className="store-avatar">{tab==='all'?'🛒': tab==='mine'?'⭐':'✅'}</div>
          <div>
            <div className="store-name">{storeTitle}</div>
            <div className="store-sub">
              {tab==='all'    && `${skills.length} skills • Supabase + Solana Devnet`}
              {tab==='mine'   && `${skills.filter(s=>s.seller===addr).length} assets publiés`}
              {tab==='bought' && `${bought.length} achats • ${bought.reduce((a,b)=>a+b.price,0).toFixed(2)} SOL dépensé`}
            </div>
          </div>
        </div>

        <StatsBar skills={skills} bought={bought} wallet={wallet}/>
        <SearchBar search={search} onSearch={setSearch} sort={sort} onSort={setSort} onNew={() => wallet ? setListOpen(true) : addToast('Connecte ton wallet!','error')}/>
        <CategoryPills active={cat} onChange={setCat}/>

        <div className="grid-wrap">
          {loading
            ? <div style={{color:'var(--text-muted)',fontFamily:'DM Mono,monospace',fontSize:13,padding:40}}>Chargement depuis Supabase...</div>
            : <SkillGrid skills={skills} bought={bought} wallet={wallet} tab={tab} search={search} cat={cat} sort={sort} onSelect={setSelected}/>
          }
        </div>
      </div>

      <button className="fab" onClick={() => wallet ? setListOpen(true) : addToast('Connecte ton wallet!','error')}>+</button>

      {listOpen  && <ListModal onClose={() => setListOpen(false)} onSubmit={handleList}/>}
      {selected  && <DetailModal skill={selected} wallet={wallet} boughtIds={boughtIds} onClose={() => setSelected(null)} onBuy={handleBuy}/>}
      <Toast toasts={toasts}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
